<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CapacityIQ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #1e2d40;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-text { font-size: 13px; color: #475569; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <div class="load-text">Loading CapacityIQ…</div>
    </div>
  </div>

  <!-- React + Babel (loads the JSX directly in browser) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" src="/static/capacity-planner.jsx" data-type="module"></script>

  <script>
    // Mount after JSX loads
    window.addEventListener('load', () => {
      const el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
</body>
</html>
